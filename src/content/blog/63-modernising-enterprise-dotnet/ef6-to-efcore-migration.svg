<svg viewBox="0 0 1300 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1300" height="480" fill="#ffffff"/>

  <text x="40" y="46" font-size="24" font-weight="700" fill="#111111">EF6 / EDMX → EF Core Migration</text>
  <text x="40" y="70" font-size="14" fill="#666666">Migrate the mapping, not the schema — verify before retiring the old context</text>

  <!-- box template: x,y,w=200,h=110 -->
  <!-- 1 -->
  <rect x="40" y="160" width="200" height="120" rx="10" fill="#000000" fill-opacity="0.04" stroke="#000000" stroke-opacity="0.2"/>
  <text x="140" y="200" font-size="14" font-weight="700" fill="#111111" text-anchor="middle">EF6 + EDMX</text>
  <text x="140" y="220" font-size="12" fill="#555555" text-anchor="middle">(legacy)</text>
  <text x="140" y="240" font-size="11" fill="#777777" text-anchor="middle">designer model,</text>
  <text x="140" y="256" font-size="11" fill="#777777" text-anchor="middle">SP mappings, TPH/TPT</text>

  <line x1="240" y1="220" x2="290" y2="220" stroke="#111111" stroke-width="2"/>
  <polygon points="298,220 284,213 284,227" fill="#111111"/>

  <!-- 2 -->
  <rect x="300" y="160" width="200" height="120" rx="10" fill="#000000" fill-opacity="0.04" stroke="#000000" stroke-opacity="0.2"/>
  <text x="400" y="200" font-size="14" font-weight="700" fill="#111111" text-anchor="middle">Inventory</text>
  <text x="400" y="222" font-size="11" fill="#777777" text-anchor="middle">stored procedures,</text>
  <text x="400" y="238" font-size="11" fill="#777777" text-anchor="middle">inheritance mapping,</text>
  <text x="400" y="254" font-size="11" fill="#777777" text-anchor="middle">computed columns</text>

  <line x1="500" y1="220" x2="550" y2="220" stroke="#111111" stroke-width="2"/>
  <polygon points="558,220 544,213 544,227" fill="#111111"/>

  <!-- 3 -->
  <rect x="560" y="160" width="200" height="120" rx="10" fill="#000000" fill-opacity="0.04" stroke="#000000" stroke-opacity="0.25"/>
  <text x="660" y="200" font-size="14" font-weight="700" fill="#111111" text-anchor="middle">EF Core</text>
  <text x="660" y="222" font-size="11" fill="#777777" text-anchor="middle">Code First, mapped</text>
  <text x="660" y="238" font-size="11" fill="#777777" text-anchor="middle">against the unchanged</text>
  <text x="660" y="254" font-size="11" fill="#777777" text-anchor="middle">legacy schema</text>

  <line x1="760" y1="220" x2="810" y2="220" stroke="#111111" stroke-width="2"/>
  <polygon points="818,220 804,213 804,227" fill="#111111"/>

  <!-- 4 -->
  <rect x="820" y="160" width="220" height="120" rx="10" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.3"/>
  <text x="930" y="196" font-size="14" font-weight="700" fill="#111111" text-anchor="middle">Run Both, Side by Side</text>
  <text x="930" y="218" font-size="11" fill="#777777" text-anchor="middle">EF6 path and EF Core path</text>
  <text x="930" y="234" font-size="11" fill="#777777" text-anchor="middle">against the same Testcontainers</text>
  <text x="930" y="250" font-size="11" fill="#777777" text-anchor="middle">characterisation suite, diff results</text>

  <line x1="1040" y1="220" x2="1090" y2="220" stroke="#111111" stroke-width="2"/>
  <polygon points="1098,220 1084,213 1084,227" fill="#111111"/>

  <!-- 5 -->
  <rect x="1100" y="160" width="160" height="120" rx="10" fill="#000000" fill-opacity="0.06" stroke="#000000" stroke-opacity="0.35"/>
  <text x="1180" y="210" font-size="14" font-weight="700" fill="#111111" text-anchor="middle">Retire EF6</text>
  <text x="1180" y="232" font-size="11" fill="#777777" text-anchor="middle">DbContext removed,</text>
  <text x="1180" y="248" font-size="11" fill="#777777" text-anchor="middle">EDMX deleted</text>

  <text x="40" y="340" font-size="12" fill="#999999">The schema doesn't change in this phase — only the mapping layer does. Stored procedures encode business</text>
  <text x="40" y="358" font-size="12" fill="#999999">rules nobody documented; cleaning them up is a separate, deliberate decision made later.</text>
</svg>
